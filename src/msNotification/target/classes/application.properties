spring.application.name=msNotification
server.port=8084

spring.main.web-application-type=servlet

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/petfinder_notification_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email SMTP
spring.mail.host=${PETFINDER_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${PETFINDER_MAIL_PORT:587}
spring.mail.username=${PETFINDER_MAIL_USERNAME:}
spring.mail.password=${PETFINDER_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

petfinder.mail.from=${PETFINDER_MAIL_FROM:${spring.mail.username}}

# External services
petfinder.clients.match.base-url=http://localhost:8086
petfinder.clients.match.connect-timeout-millis=3000
petfinder.clients.match.response-timeout-millis=5000

petfinder.clients.adopter.base-url=http://localhost:8083
petfinder.clients.adopter.connect-timeout-millis=3000
petfinder.clients.adopter.response-timeout-millis=5000

petfinder.clients.shelter.base-url=http://localhost:8082
petfinder.clients.shelter.connect-timeout-millis=3000
petfinder.clients.shelter.response-timeout-millis=5000

petfinder.clients.vet.base-url=http://localhost:8085
petfinder.clients.vet.connect-timeout-millis=3000
petfinder.clients.vet.response-timeout-millis=5000
